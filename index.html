<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام حساب مشتری</title>

<style>
body{
    font-family:tahoma;
    background:#f2f2f2;
    margin:0;
}

.box{
    width:360px;
    margin:50px auto;
    background:#ffffff;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

input{
    width:90%;
    padding:10px;
    font-size:18px;
    text-align:center;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}

#result{
    margin-top:25px;
    font-size:18px;
    font-weight:bold;
}
.logo{
    width:150px;
    display:block;
    margin:0 auto 20px;
}
</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h2>کد خود را وارد کنید</h2>

<p>کد ۴ رقمی خود را وارد کنید</p>

<input id="code" maxlength="4">

<br>

<button onclick="showAccount()">مشاهده حساب</button>

<div id="result"></div>

</div>

<hr style="margin:35px 0;">

<p style="line-height:32px;color:#666;font-size:16px;">

مشتری گرامی

<br><br>

در صورت امکان لطفاً نسبت به تسویه حساب اقدام فرمایید.

<br><br>

از اعتماد شما سپاسگزاریم.

</p>

<div style="margin-top:20px;font-size:24px;font-weight:bold;">

<div id="cardNumber" onclick="copyCard()" style="cursor:pointer;font-size:24px;font-weight:bold;">
6219861082156117
</div>

<div id="copymsg" style="color:green;margin-top:10px;"></div>

<br>

<span style="font-size:18px;">

به نام حمیدرضا رحمتی

</span>

</div>

<script>
let customers = {};

fetch("customers.json")
.then(response => response.json())
.then(data => {
    customers = data;
});

function showAccount(){

var code=document.getElementById("code").value;

if(customers[code]){

document.getElementById("result").innerHTML =
"نام: " + customers[code].name +
"<br><br>جمع حساب: " + customers[code].money +
"<br><br>تاریخ بروزرسانی: " + customers[code].date;

}else{

document.getElementById("result").innerHTML="❌ کد وارد شده صحیح نیست.";

}

}

</script>

<script>

function copyCard(){

navigator.clipboard.writeText("6219861082156117");

document.getElementById("copymsg").innerHTML="✅ شماره کارت کپی شد.";

setTimeout(function(){

document.getElementById("copymsg").innerHTML="";

},2000);

}

</script>

</body>
</html>
