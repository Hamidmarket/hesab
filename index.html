<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام حساب مشتری</title>

<style>
body{
    font-family:tahoma;
    background:#f2f2f2;
    margin:0;
}

.box{
    width:320px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

input{
    width:90%;
    padding:10px;
    font-size:18px;
    text-align:center;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}

#result{
    margin-top:25px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>استعلام حساب مشتری</h2>

<p>کد ۴ رقمی خود را وارد کنید</p>

<input id="code" maxlength="4">

<br>

<button onclick="showAccount()">مشاهده حساب</button>

<div id="result"></div>

</div>

<script>

var customers = {
"2584": {
name:"عباس رحمتی",
money:"2.134.000 تومان"
},

"4861": {
name:"محمد حسین رحمتی",
money:"3.637.000 تومان"
},

"9012": {
name:"دانیال ایراهیمی",
money:"1.036.000 تومان"
}

};

function showAccount(){

var code=document.getElementById("code").value;

if(customers[code]){

document.getElementById("result").innerHTML=
"نام: "+customers[code].name+
"<br><br>جمع حساب:<br>"+customers[code].money;

}else{

document.getElementById("result").innerHTML="❌ کد وارد شده صحیح نیست.";

}

}

</script>

</body>
</html>
